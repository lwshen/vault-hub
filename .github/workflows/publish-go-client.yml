name: Build and Publish Go Client
on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:
jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
      - name: Set package version
        id: set_version
        run: |
          if [[ "${{ github.ref }}" =~ ^refs/tags/v ]]; then
            # Tag event - use tag name
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]] || [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            # workflow_dispatch or main branch push - use timestamp
            echo "version=v0.0.$(date +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT
          else
            # Fallback (should not happen with current triggers)
            echo "version=0.0.0-dev" >> $GITHUB_OUTPUT
          fi
      - name: Generate Go Client Library
        uses: openapi-generators/openapitools-generator-action@v1
        with:
          generator: go
          openapi-file: packages/api/openapi/api.yaml
          generator-tag: v7.13.0
          command-args: --additional-properties=packageVersion=${{ steps.set_version.outputs.version }} --additional-properties=moduleName=github.com/lwshen/vault-hub-go-client --git-user-id lwshen --git-repo-id vault-hub-go-client
      - name: Ensure LICENSE is included
        run: cp LICENSE go-client/LICENSE
      - name: Initialize Go module and publish
        run: |
          # Prepare generated client
          cd go-client
          go mod tidy
          go build ./...

          # Create repository if it doesn't exist and push
          cd ..

          # Configure git identity
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Clone existing repository to preserve history
          git clone https://${{ secrets.PUBLISH_TOKEN }}@github.com/lwshen/vault-hub-go-client.git publish-repo || exit 1
          cd publish-repo

          # Ensure we are on main (create if missing)
          git checkout -B main || git checkout -b main

          # Replace repository contents (except .git) with newly generated client
          find . -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +
          cp -R ../go-client/. .

          # Commit changes only if there are modifications
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Generated Go client library ${{ github.ref_name }}"
          fi

          # Tag the release only for tag events
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" =~ ^refs/tags/v ]]; then
            git tag ${{ github.ref_name }}
          fi

          # Push to separate repository only outside of pull_request events
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            git push origin main
            # Push tag only if it was created
            if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" =~ ^refs/tags/v ]]; then
              git push origin ${{ github.ref_name }}
            fi
          else
            echo "Skipping push during pull_request event"
          fi
      - name: Upload OpenAPI client artifact
        uses: actions/upload-artifact@v6
        with:
          name: go-client
          path: go-client
          if-no-files-found: error
