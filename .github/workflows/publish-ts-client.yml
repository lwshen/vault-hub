name: Build and Publish Typescript Client
on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set package version
        id: set_version
        run: |
          if [[ "${{ github.ref }}" =~ ^refs/tags/v ]]; then
            # Tag event - use tag name
            VERSION="${{ github.ref_name }}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]] || [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            # workflow_dispatch or main branch push - use timestamp
            VERSION="v0.0.$(date +'%Y%m%d%H%M%S')"
          else
            # Fallback (should not happen with current triggers)
            VERSION="0.0.0-dev"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Package version: $VERSION"
      - name: Generate Typescript Fetch Client Library
        uses: openapi-generators/openapitools-generator-action@v1
        with:
          generator: typescript-fetch
          openapi-file: packages/api/openapi/api.yaml
          generator-tag: v7.13.0
          command-args: --additional-properties=npmName=@lwshen/vault-hub-ts-fetch-client --additional-properties=npmVersion=${{ steps.set_version.outputs.version }} --additional-properties=useSingleRequestParameter=false --git-user-id lwshen --git-repo-id vault-hub
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: typescript-fetch-client
          path: typescript-fetch-client
          retention-days: 1
          if-no-files-found: error

  publish-github:
    needs: generate
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Node for GitHub Packages
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          registry-url: https://npm.pkg.github.com
          scope: "@lwshen"
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: typescript-fetch-client
      - name: Publish to GitHub Packages
        run: |
          npm install
          npm run build
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    needs: generate
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Set up Node for npm registry
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: typescript-fetch-client
      - name: Publish to npm registry
        run: |
          npm install
          npm run build
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
