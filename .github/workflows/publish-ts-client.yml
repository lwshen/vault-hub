name: Build and Publish Typescript Client
on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:
jobs:
  build-and-publish-github:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node for GitHub Packages
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          registry-url: https://npm.pkg.github.com
          scope: "@lwshen"
      - name: Set package version
        id: set_version
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "version=v0.0.$(date +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi
      - name: Generate Typescript Fetch Client Library
        uses: openapi-generators/openapitools-generator-action@v1
        with:
          generator: typescript-fetch
          openapi-file: packages/api/openapi/api.yaml
          generator-tag: v7.13.0
          command-args: --additional-properties=npmName=@lwshen/vault-hub-ts-fetch-client --additional-properties=npmVersion=${{ steps.set_version.outputs.version }} --additional-properties=useSingleRequestParameter=false --git-user-id lwshen --git-repo-id vault-hub
      - name: Publish to GitHub Packages
        run: |
          # Push to separate repository only outside of pull_request events
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            cd typescript-fetch-client
            echo ${{ github.ref_name }}
            cat package.json
            npm install
            npm run build
            npm publish
          else
            echo "Skipping push during pull_request event"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  build-and-publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node for npm registry
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org
      - name: Set package version
        id: set_version
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "version=v0.0.$(date +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi
      - name: Generate Typescript Fetch Client Library
        uses: openapi-generators/openapitools-generator-action@v1
        with:
          generator: typescript-fetch
          openapi-file: packages/api/openapi/api.yaml
          generator-tag: v7.13.0
          command-args: --additional-properties=npmName=@lwshen/vault-hub-ts-fetch-client --additional-properties=useSingleRequestParameter=false --additional-properties=npmVersion=${{ steps.set_version.outputs.version }} --git-user-id lwshen --git-repo-id vault-hub
      - name: Build package
        run: |
          cd typescript-fetch-client
          npm install
          npm run build
      - name: Publish to npm registry
        run: |
          # Push to separate repository only outside of pull_request events
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            cd typescript-fetch-client
            npm publish --access public
          else
            echo "Skipping push during pull_request event"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Upload OpenAPI client artifact
        uses: actions/upload-artifact@v6
        with:
          name: typescript-fetch-client
          path: typescript-fetch-client
          if-no-files-found: error
