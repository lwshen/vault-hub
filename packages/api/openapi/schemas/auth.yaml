LoginRequest:
  type: object
  required:
    - email
    - password
  properties:
    email:
      type: string
      format: email
    password:
      type: string
LoginResponse:
  type: object
  required:
    - token
    - refreshToken
  properties:
    token:
      type: string
    refreshToken:
      type: string
      description: Refresh token for obtaining new access tokens
SignupRequest:
  type: object
  required:
    - email
    - password
    - name
  properties:
    email:
      type: string
      format: email
    password:
      type: string
    name:
      type: string
SignupResponse:
  type: object
  required:
    - token
    - refreshToken
  properties:
    token:
      type: string
    refreshToken:
      type: string
      description: Refresh token for obtaining new access tokens

PasswordResetRequest:
  type: object
  required:
    - email
  properties:
    email:
      type: string
      format: email

PasswordResetConfirmRequest:
  type: object
  required:
    - token
    - newPassword
  properties:
    token:
      type: string
    newPassword:
      type: string

MagicLinkRequest:
  type: object
  required:
    - email
  properties:
    email:
      type: string
      format: email

EmailTokenResponse:
  type: object
  required:
    - success
    - code
  properties:
    success:
      type: boolean
      description: Indicates whether the email token request was accepted
    code:
      type: string
      description: Machine-readable status code describing the outcome
      enum:
        - email_token_sent
        - email_token_rate_limited
        - email_token_failed

ChangePasswordRequest:
  type: object
  required:
    - currentPassword
    - newPassword
  properties:
    currentPassword:
      type: string
      description: Current password for verification
    newPassword:
      type: string
      description: New password (must meet complexity requirements)

RefreshTokenRequest:
  type: object
  required:
    - refreshToken
  properties:
    refreshToken:
      type: string
      description: The refresh token

RefreshTokenResponse:
  type: object
  required:
    - token
    - refreshToken
    - expiresIn
  properties:
    token:
      type: string
      description: New JWT access token
    refreshToken:
      type: string
      description: New refresh token
    expiresIn:
      type: integer
      format: int32
      description: Token expiration time in seconds
